version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major-updates:
        update-types: [major]
    ignore:
      - dependency-name: "typescript"      # TS 7 (tsgo) is a major rewrite
        update-types: ["version-update:semver-major"]
      - dependency-name: "jose"            # crypto lib — review JWT/JWKS API changes
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ['*']

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns: ["*"]
