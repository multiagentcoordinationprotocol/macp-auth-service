name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test -- --coverage --forceExit
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Smoke-test compiled build
        run: |
          node dist/index.js &
          PID=$!
          # wait for /healthz up to 10s
          for i in $(seq 1 20); do
            sleep 0.5
            if curl -sfo /dev/null http://localhost:3200/healthz; then
              echo "healthz OK"
              break
            fi
          done
          curl -sf http://localhost:3200/healthz || (kill $PID; exit 1)
          curl -sf http://localhost:3200/.well-known/jwks.json > /dev/null
          curl -sf -X POST http://localhost:3200/tokens -H 'content-type: application/json' -d '{"sender":"ci"}' > /dev/null
          kill $PID
